<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/favicon.svg">
    <title>Pen & Paper</title>
    <link rel="stylesheet" href="./stylesheets/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
</head>

<body class="vh-100 d-flex justify-content-center align-items-center">

    <div id="pageContainer" class="bg-padding container d-flex flex-column align-items-center">

        <div class="mobile-nav align-items-center justify-content-between mt-3">
            <i id="close-mobile-menu-icon" class="fa-solid fa-xmark fa-2x" style="color: var(--dark);"></i>
            <i id="hamburger-icon" class="fa-solid fa-2x fa-bars" style="color: var(--dark)"></i>
            <a href="index.html" class="mt-2">
                <h2>Pen & Paper</h2>
            </a>
            <i class="fa-solid fa-toggle-on fa-2xl toggle-theme" style="color: var(--dark);"></i>
        </div>

        <div class="navigation container p-5">
            <div class="row">
                <div class="col d-flex justify-content-between align-items-center">
                    <a href="index.html">
                        <h2>Pen & Paper</h2>
                    </a>
                    <div class="right-end d-flex align-items-center">
                        <div class="d-flex gap-5">
                            <a class="anchor-item" href="dictionary.html">Dictionary</a>
                            <a class="anchor-item" href="translator.html">Translator</a>
                            <a class="anchor-item" href="about.html">About</a>
                        </div>
                        <i class="fa-solid fa-toggle-on fa-2xl toggle-theme" style="color: var(--dark);"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="hamburger">
            <div class="menu-items d-flex flex-column text-center">
                <a class="text-decoration-none" href="dictionary.html">Dictionary</a>
                <a class="text-decoration-none" href="translator.html">Translator</a>
                <a class="text-decoration-none" href="about.html">About</a>
            </div>
        </div>

        <section class="translator-section mt-3">
            <div class="container translator">
                <div class="row dropdowns">
                    <div class="col m-0 p-0">
                        <select class="languages w-100" name="primary" id="primary"></select>
                    </div>
                    <div class="col-auto d-flex justify-content-center align-items-center">
                        <i class="fa-solid fa-repeat fa-lg switch-languages-icon" style="color: var(--dark);"></i>
                    </div>
                    <div class="col m-0 p-0">
                        <select class="languages w-100" name="outcome" id="outcome"></select>
                    </div>
                </div>
                <div class="row textfields">
                    <div class="col-lg-6 m-0 p-0 col-md-12">
                        <div class="outer-container from-text mt-4">
                            <div class="inner-container d-flex gap-3">
                                <textarea class="enter-text" name="enter-text" id="enter-text"
                                    placeholder="Enter text..."></textarea>
                                <i id="copy-from" class="fa-regular fa-lg fa-copy mt-2 from-text-copy-icon copy-icon"
                                    style="color: var(--dark);"></i>
                            </div>
                            <i id="sound-from"
                                class="fa-solid fa-volume-high fa-lg mt-4 from-text-sound-icon sound-icon"
                                style="color: var(--dark);"></i>
                        </div>
                    </div>
                    <div class="col-lg-6 m-0 p-0 col-md-12">
                        <div class="outer-container to-text mt-4">
                            <div class="inner-container d-flex align-items-start gap-3">
                                <textarea class="translation" name="transltation" id="translation"
                                    placeholder="Translation..." readonly disabled></textarea>
                                <i id="copy-to" class="fa-regular fa-lg fa-copy to-text-copy-icon copy-icon"
                                    style="color: var(--dark);"></i>
                            </div>
                            <i id="sound-to" class="fa-solid fa-volume-high mt-4 fa-lg to-text-sound-icon sound-icon"
                                style="color: var(--dark);"></i>
                        </div>
                    </div>
                </div>
                <div class="row buttons">
                    <div class="translatebtn text-center mt-4">Translate Text</div>
                </div>
            </div>
        </section>

    </div>


    <script src="https://code.jquery.com/jquery-3.7.0.min.js" integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/c193febbe5.js" crossorigin="anonymous"></script>
    <script src="./scripts/countries.js"></script>
    <script src="./scripts/darkmode.js"></script>
    <script src="./scripts/translator.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
