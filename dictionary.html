<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/favicon.svg">
    <title>Pen & Paper</title>
    <link rel="stylesheet" href="./stylesheets/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
</head>

<body id="pageContainerDictionary" class="vh-100 d-flex justify-content-center align-items-center">

    <div id="pageContainer" class="bg-padding container">

        <div class="mobile-nav align-items-center justify-content-between mt-3">
            <i id="close-mobile-menu-icon" class="fa-solid fa-xmark fa-2x" style="color: var(--dark);"></i>
            <i id="hamburger-icon" class="fa-solid fa-2x fa-bars" style="color: var(--dark)"></i>
            <a href="index.html" class="mt-2">
                <h2>Pen & Paper</h2>
            </a>
            <i class="fa-solid fa-toggle-on fa-2xl toggle-theme" style="color: var(--dark);"></i>
        </div>

        <div class="navigation container p-5">
            <div class="row">
                <div class="col d-flex justify-content-between align-items-center">
                    <a href="index.html">
                        <h2>Pen & Paper</h2>
                    </a>
                    <div class="right-end d-flex align-items-center">
                        <div class="d-flex gap-5">
                            <a class="anchor-item" href="dictionary.html">Dictionary</a>
                            <a class="anchor-item" href="translator.html">Translator</a>
                            <a class="anchor-item" href="about.html">About</a>
                        </div>
                        <i class="fa-solid fa-toggle-on fa-2xl toggle-theme" style="color: var(--dark);"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="hamburger">
            <div class="menu-items d-flex flex-column text-center">
                <a class="text-decoration-none" href="dictionary.html">Dictionary</a>
                <a class="text-decoration-none" href="translator.html">Translator</a>
                <a class="text-decoration-none" href="about.html">About</a>
            </div>
        </div>

        <div class="search container align-items-center text-center">
            <div class="row">
                <div class="col d-flex flex-column gap-3">
                    <h1>Type in a word</h1>
                    <div class="search-bar d-flex justify-content-between align-items-center px-4"><input
                            name="word-lookup" class="word-input" type="text" placeholder="It can be any word..."
                            required><i class="close-icon fa-solid fa-lg fa-xmark d-none">
                    </div>
                    <p class="error-msg"></p>
                    <div class="word-search-btn mx-auto">Discover Meaning</div>
                </div>
            </div>
        </div>

        <div class="revealed container p-5">

            <div class="mobile-search-container justify-content-between mt-5 mb-5 gap-2">
                <div class="search-bar d-flex justify-content-between align-items-center px-4 w-100"><input
                        name="word-lookup" class="word-input" type="text" placeholder="It can be any word..."
                        required><i class="close-icon fa-solid fa-lg fa-xmark d-none">
                </div>
                <div class="word-search-btn mx-auto">Search</div>
            </div>

            <div class="row">
                <div class="first col-lg-6 col-md-12 col-sm-12">
                    <div class="word-upper">
                        <div class="details d-flex justify-content-between align-items-center">
                            <div class="word">
                                <h1 class="text-capitalize"></h1>
                                <span class="phonetic"></span>
                            </div>
                            <i class="fa-solid fa-circle-play fa-3x play-sound" style="color: var(--dark);"></i>
                        </div>
                    </div>
                    <div class="definitions mt-4"></div>
                    <div class="synonyms mt-4 d-flex justify-content-start flex-wrap"></div>
                </div>
                <div class="second col-lg-6 col-md-12 col-sm-12 d-flex align-items-center mt-5">
                    <div class="details d-flex flex-column align-items-end">
                        <div class="examples"></div>
                        <div class="back-to-search text-decoration-underline mt-3">back to search</div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.0.min.js"
        integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/c193febbe5.js" crossorigin="anonymous"></script>
    <script src="./scripts/darkmode.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
